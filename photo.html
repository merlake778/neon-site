<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Фотоальбом | I · You · We · Achievements</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0b0e1a, #010101);
            font-family: 'Segoe UI', 'Poppins', 'Quicksand', sans-serif;
            padding: 30px 20px;
            color: #eee;
        }
        .album-container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(10, 14, 23, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 25px;
            border: 1px solid rgba(255, 100, 200, 0.5);
            box-shadow: 0 0 30px rgba(255, 80, 180, 0.2);
        }
        h1 {
            text-align: center;
            font-size: 2.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffaaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .sub {
            text-align: center;
            margin-bottom: 35px;
            color: #ffb7e6;
            font-style: italic;
        }
        .sections {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 40px;
        }
        .section {
            flex: 1;
            min-width: 220px;
            background: rgba(0, 0, 0, 0.45);
            border-radius: 32px;
            padding: 18px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 200, 255, 0.3);
        }
        .section h2 {
            font-size: 2rem;
            text-align: center;
            border-bottom: 2px dashed #ff80c0;
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            padding-bottom: 8px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }
        .photo-card {
            position: relative;
            width: 130px;
            height: 130px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 5px 12px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,160,210,0.7);
            transition: transform 0.2s;
            background: #222;
            cursor: pointer;
        }
        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .photo-card:hover {
            transform: scale(1.03);
            border-color: #ff99cc;
        }
        .delete-photo {
            position: absolute;
            top: 5px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: #ffaaaa;
            border-radius: 30px;
            width: 24px;
            height: 24px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            line-height: 22px;
            cursor: pointer;
            backdrop-filter: blur(2px);
            z-index: 2;
        }
        .delete-photo:hover {
            background: #ff3366;
            color: white;
        }
        .empty-gallery {
            color: #ccc;
            text-align: center;
            width: 100%;
            padding: 30px 0;
            font-style: italic;
        }
        .add-form {
            background: rgba(0,0,0,0.6);
            border-radius: 48px;
            padding: 25px;
            margin-top: 20px;
            border: 1px solid #ff80c0;
        }
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            justify-content: center;
        }
        .field {
            flex: 1;
            min-width: 160px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ffbfe5;
        }
        select, input[type="file"] {
            width: 100%;
            padding: 10px 15px;
            border-radius: 40px;
            background: #1e1a2f;
            border: 1px solid #ff99cc;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
        }
        .add-btn {
            background: linear-gradient(95deg, #ff66aa, #ff3388);
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .add-btn:hover {
            transform: scale(1.02);
            background: #ff5599;
            box-shadow: 0 0 15px #ff66aa;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #ff99cc;
            text-decoration: none;
            border-bottom: 1px dashed;
        }
        /* Модальное окно для просмотра фото */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal.active {
            display: flex;
        }
        .modal-img {
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 20px;
            border: 3px solid #ff80c0;
            box-shadow: 0 0 30px #ff66aa;
        }
        .modal-nav {
            display: flex;
            gap: 40px;
            margin-top: 25px;
        }
        .modal-nav button {
            background: rgba(255,80,150,0.7);
            border: none;
            font-size: 2rem;
            padding: 10px 30px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        .modal-nav button:hover {
            background: #ff66aa;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2.5rem;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
        }
        .modal-caption {
            margin-top: 15px;
            color: #ffccff;
            font-size: 1.1rem;
        }
        @media (max-width: 760px) {
            .photo-card { width: 100px; height: 100px; }
            .section h2 { font-size: 1.5rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="album-container">
    <h1>📸 Фотоальбом</h1>
    <div class="sub">I &nbsp; You✌🏻 &nbsp; We❤️ &nbsp; My Achievements</div>

    <div class="sections" id="sectionsContainer"></div>

    <div class="add-form">
        <h3>➕ Добавить новое фото</h3>
        <div class="form-group">
            <div class="field">
                <label>📁 Раздел</label>
                <select id="categorySelect">
                    <option value="I">I (Я)</option>
                    <option value="You">You ✌🏻</option>
                    <option value="We">We ❤️</option>
                    <option value="Achievements">My Achievements</option>
                </select>
            </div>
            <div class="field">
                <label>🖼️ Выберите фото</label>
                <input type="file" id="photoInput" accept="image/jpeg,image/png,image/jpg,image/webp">
            </div>
            <div>
                <button class="add-btn" id="addPhotoBtn">✨ Добавить</button>
            </div>
        </div>
        <p style="font-size:12px; margin-top:12px;">※ фото сохраняются в браузере. Нажмите на фото для увеличения.</p>
    </div>
    <a href="index.html" class="back-link">← На главную</a>
</div>

<!-- Модальное окно -->
<div id="modal" class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <img id="modalImage" class="modal-img" src="" alt="просмотр">
    <div class="modal-nav">
        <button id="prevBtn">◀ Назад</button>
        <button id="nextBtn">Вперед ▶</button>
    </div>
    <div class="modal-caption" id="modalCaption"></div>
</div>

<script>
    // ---------- НАСТРОЙКИ ----------
    const STORAGE_KEYS = {
        I: 'album_I',
        You: 'album_You',
        We: 'album_We',
        Achievements: 'album_Achievements'
    };
    const MAX_PHOTOS = 30;
    let currentCategory = '';      // текущая открытая категория в модалке
    let currentIndex = 0;          // индекс просматриваемого фото
    let currentImages = [];         // массив ссылок на фото в текущей категории

    // Загрузка из localStorage
    function loadCategory(category) {
        const key = STORAGE_KEYS[category];
        const stored = localStorage.getItem(key);
        return stored ? JSON.parse(stored) : [];
    }

    function saveCategory(category, imagesArray) {
        const key = STORAGE_KEYS[category];
        localStorage.setItem(key, JSON.stringify(imagesArray));
    }

    function addPhotoToCategory(category, dataURL) {
        let images = loadCategory(category);
        if (images.length >= MAX_PHOTOS) {
            alert(`В разделе ${category} максимум ${MAX_PHOTOS} фото. Сначала удалите несколько.`);
            return false;
        }
        images.unshift(dataURL);
        saveCategory(category, images);
        return true;
    }

    function deletePhotoFromCategory(category, index) {
        let images = loadCategory(category);
        if (index >= 0 && index < images.length) {
            images.splice(index, 1);
            saveCategory(category, images);
            return true;
        }
        return false;
    }

    function fileToDataURL(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // Отрисовка всех секций
    function renderAllSections() {
        const container = document.getElementById('sectionsContainer');
        const categories = [
            { id: 'I', title: '✨ I (Я) ✨', emoji: '👤' },
            { id: 'You', title: '💫 You ✌🏻', emoji: '🌸' },
            { id: 'We', title: '💞 We ❤️', emoji: '💑' },
            { id: 'Achievements', title: '🏆 My Achievements', emoji: '🏅' }
        ];
        container.innerHTML = '';
        for (let cat of categories) {
            const images = loadCategory(cat.id);
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'section';
            sectionDiv.innerHTML = `
                <h2>${cat.emoji} ${cat.title}</h2>
                <div class="gallery" id="gallery-${cat.id}"></div>
            `;
            container.appendChild(sectionDiv);
            const galleryDiv = sectionDiv.querySelector(`.gallery`);
            if (images.length === 0) {
                galleryDiv.innerHTML = '<div class="empty-gallery">💔 Нет фотографий. Добавьте первую!</div>';
            } else {
                galleryDiv.innerHTML = '';
                images.forEach((imgData, idx) => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    card.innerHTML = `
                        <img src="${imgData}" alt="Фото">
                        <div class="delete-photo" data-cat="${cat.id}" data-index="${idx}">🗑️</div>
                    `;
                    // Открытие модалки при клике на картинку (не на кнопку удаления)
                    const imgEl = card.querySelector('img');
                    imgEl.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openModal(cat.id, idx);
                    });
                    galleryDiv.appendChild(card);
                });
                // обработчики удаления
                galleryDiv.querySelectorAll('.delete-photo').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const category = btn.getAttribute('data-cat');
                        const index = parseInt(btn.getAttribute('data-index'));
                        if (confirm('Удалить фото?')) {
                            deletePhotoFromCategory(category, index);
                            renderAllSections();
                            // если модалка была открыта на удалённом фото — закрываем
                            if (currentCategory === category && currentImages.length > 0) {
                                closeModal();
                            }
                        }
                    });
                });
            }
        }
    }

    // Открыть модальное окно с фото из категории
    function openModal(category, index) {
        currentCategory = category;
        currentImages = loadCategory(category);
        if (!currentImages.length) return;
        currentIndex = Math.min(index, currentImages.length - 1);
        updateModalImage();
        const modal = document.getElementById('modal');
        modal.classList.add('active');
    }

    function updateModalImage() {
        const modalImg = document.getElementById('modalImage');
        const caption = document.getElementById('modalCaption');
        if (currentImages.length > 0 && currentIndex >= 0 && currentIndex < currentImages.length) {
            modalImg.src = currentImages[currentIndex];
            caption.innerText = `${currentCategory} · ${currentIndex+1} / ${currentImages.length}`;
        }
    }

    function nextImage() {
        if (currentImages.length === 0) return;
        currentIndex = (currentIndex + 1) % currentImages.length;
        updateModalImage();
    }

    function prevImage() {
        if (currentImages.length === 0) return;
        currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
        updateModalImage();
    }

    function closeModal() {
        const modal = document.getElementById('modal');
        modal.classList.remove('active');
        currentCategory = '';
        currentImages = [];
    }

    // Добавление фото
    async function handleAddPhoto() {
        const category = document.getElementById('categorySelect').value;
        const fileInput = document.getElementById('photoInput');
        if (!fileInput.files || fileInput.files.length === 0) {
            alert('Выберите изображение!');
            return;
        }
        const file = fileInput.files[0];
        if (!file.type.startsWith('image/')) {
            alert('Можно загружать только изображения.');
            return;
        }
        if (file.size > 5 * 1024 * 1024) {
            alert('Файл слишком большой (макс. 5 МБ).');
            return;
        }
        try {
            const dataURL = await fileToDataURL(file);
            const success = addPhotoToCategory(category, dataURL);
            if (success) {
                fileInput.value = '';
                renderAllSections();
            }
        } catch (err) {
            alert('Ошибка чтения файла');
        }
    }

    // Инициализация событий
    document.getElementById('addPhotoBtn').addEventListener('click', handleAddPhoto);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('prevBtn').addEventListener('click', prevImage);
    document.getElementById('nextBtn').addEventListener('click', nextImage);
    // закрытие по клику вне картинки
    document.getElementById('modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('modal')) closeModal();
    });
    // клавиши вправо/влево
    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('modal');
        if (!modal.classList.contains('active')) return;
        if (e.key === 'ArrowRight') nextImage();
        if (e.key === 'ArrowLeft') prevImage();
        if (e.key === 'Escape') closeModal();
    });

    renderAllSections();
</script>
</body>
</html>
