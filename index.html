<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Самурайское меню | Неон</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: #0a0c12;
            background-image: url('https://images.pexels.com/photos/17452687/pexels-photo-17452687.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load');
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', monospace;
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(1px);
            z-index: 0;
            pointer-events: none;
        }
        .neon-border {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            pointer-events: none;
            border-radius: 28px;
            box-shadow: 0 0 8px #0ff, 0 0 15px #0ff, inset 0 0 8px #0ff;
            animation: neonPulse 1.8s infinite alternate;
            z-index: 10;
        }
        @keyframes neonPulse {
            0% { box-shadow: 0 0 5px cyan, 0 0 10px cyan, inset 0 0 4px cyan; border: 1px solid rgba(0, 255, 255, 0.5); }
            100% { box-shadow: 0 0 18px cyan, 0 0 28px #00ccff, inset 0 0 12px cyan; border: 1px solid rgba(0, 255, 255, 0.9); }
        }
        .menu-container {
            position: relative;
            z-index: 20;
            width: 280px;
            margin: 60px 0 60px 50px;
            background: rgba(10, 14, 23, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        .menu-title {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 35px;
            color: #fff;
            text-shadow: 0 0 5px cyan, 0 0 10px #00aaff;
            font-family: 'Orbitron', monospace;
            border-bottom: 1px dashed cyan;
            display: inline-block;
            width: 100%;
            padding-bottom: 12px;
        }
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            list-style: none;
        }
        .menu-list li {
            width: 100%;
        }
        .neon-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: 'Segoe UI', 'Orbitron', monospace;
            letter-spacing: 1px;
            padding: 12px 0;
            border-radius: 60px;
            background: rgba(0, 20, 30, 0.7);
            color: #ccf6ff;
            border: 1px solid rgba(0, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .neon-btn:hover {
            transform: translateX(12px) translateY(-3px) scale(1.05);
            font-size: 1.75rem;
            background: rgba(0, 180, 210, 0.25);
            color: #ffffff;
            text-shadow: 0 0 6px cyan, 0 0 12px #0ff;
            border-color: cyan;
            box-shadow: 0 0 15px cyan, 0 5px 20px rgba(0,255,255,0.4);
            letter-spacing: 2px;
            animation: subtleWobble 0.3s ease;
        }
        @keyframes subtleWobble {
            0% { transform: translateX(8px) translateY(-2px) scale(1.02); }
            50% { transform: translateX(14px) translateY(-4px) scale(1.06); }
            100% { transform: translateX(12px) translateY(-3px) scale(1.05); }
        }
        .neon-btn:active {
            transform: scale(0.98) translateX(8px);
            transition: 0.02s;
        }
        @media (max-width: 700px) {
            .menu-container { width: 240px; margin-left: 20px; margin-top: 30px; padding: 20px 15px; }
            .neon-btn { font-size: 1.2rem; padding: 8px 0; }
            .neon-btn:hover { font-size: 1.4rem; transform: translateX(6px) translateY(-2px); }
            .neon-border { top: 12px; left: 12px; right: 12px; bottom: 12px; }
        }
        .hint {
            position: fixed;
            bottom: 15px;
            right: 20px;
            color: rgba(255,255,200,0.5);
            font-size: 12px;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 25;
            font-family: monospace;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        /* glitch эффект заголовка */
.menu-title {
    position: relative;
    animation: glitch 2s infinite;
}

@keyframes glitch {
    0% { text-shadow: 0 0 5px cyan; }
    20% { text-shadow: 2px 0 red, -2px 0 blue; }
    40% { text-shadow: -2px 0 red, 2px 0 blue; }
    60% { text-shadow: 0 0 10px cyan; }
    100% { text-shadow: 0 0 5px cyan; }
}

/* неоновый курсор */
.cursor {
    width: 12px;
    height: 12px;
    border: 2px solid cyan;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px cyan;
    z-index: 999;
}

/* искры */
.spark {
    position: fixed;
    width: 4px;
    height: 4px;
    background: cyan;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkAnim 0.5s linear forwards;
}

@keyframes sparkAnim {
    to {
        transform: translateY(20px) scale(0);
        opacity: 0;
    }
}
    </style>
</head>
<body>
<div class="neon-border"></div>
<div class="menu-container">
    <div class="menu-title">⚔️ BUSHIDO ⚔️</div>
    <ul class="menu-list">
        <li><a href="anonymous.html" class="neon-btn">Anonymous</a></li>
        <li><a href="stalker.html" class="neon-btn">S.T.A.L.K.E.R.</a></li>
        <li><a href="fortuna.html" class="neon-btn">Fortuna</a></li>
        <li><a href="/four" class="neon-btn">FOUR</a></li>
        <li><a href="/five" class="neon-btn">FIVE</a></li>
        <li><a href="/six" class="neon-btn">SIX</a></li>
        <li><a href="/seven" class="neon-btn">SEVEN</a></li>
        <li><a href="/eight" class="neon-btn">EIGHT</a></li>
        <li><a href="/nine" class="neon-btn">NINE</a></li>
        <li><a href="/ten" class="neon-btn">TEN</a></li>
    </ul>
</div>
<div class="hint">⚡ клик — страница не найдена (404) ⚡</div>
<div class="cursor" id="cursor"></div>

<audio id="hoverSound">
    <source src="https://www.soundjay.com/button/sounds/button-16.mp3">
</audio>

<script>
// курсор
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
});

// звук при наведении
const sound = document.getElementById('hoverSound');
document.querySelectorAll('.neon-btn').forEach(btn => {
    btn.addEventListener('mouseenter', () => {
        sound.currentTime = 0;
        sound.play().catch(()=>{});
    });
});

// искры при клике
document.addEventListener('click', e => {
    for (let i = 0; i < 6; i++) {
        const s = document.createElement('div');
        s.className = 'spark';
        s.style.left = e.clientX + 'px';
        s.style.top = e.clientY + 'px';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 500);
    }
});
</script>
</body>
</html>
